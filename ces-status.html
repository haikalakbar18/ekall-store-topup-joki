<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cek Status Joki - Ekall</title>
    <style>
        body { background-color: #121620; color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #ffcc00; }
        .box { background-color: #1a202c; padding: 30px; border-radius: 12px; max-width: 400px; width: 100%; box-sizing: border-box; border: 1px solid #2d3748; }
        input, button { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        input { background-color: #2d3748; border: 1px solid #4a5568; color: white; }
        button { background-color: #ffcc00; color: #121620; border: none; font-weight: bold; cursor: pointer; }
        .hasil { background-color: #2d3748; padding: 15px; border-radius: 6px; display: none; margin-top: 10px; border-left: 5px solid #ffcc00; }
    </style>
</head>
<body>
    <nav style="display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box; background: #1a202c; padding: 15px 30px; border-bottom: 2px solid #ffcc00; margin-bottom: 20px;">
        <!-- Logo di Kiri -->
        <div style="font-weight: bold; font-size: 18px; color: #ffcc00;">🛒 EKALL STORE</div>
        
        <!-- Menu di Pojok Kanan -->
        <div style="display: flex; gap: 20px;">
            <a href="index.html" style="color: #ffffff; text-decoration: none; font-weight: bold; font-size: 15px;">🎮 Form Joki</a>
            <a href="ces-status.html" style="color: #ffcc00; text-decoration: none; font-weight: bold; font-size: 15px;">🔍 Cek Status</a>
        </div>
    </nav>

    <h1>Cek Status Pesanan Joki</h1>
    <div class="box">
        <label>Masukkan ID Orderan Kamu:</label>
        <input type="text" id="inputOrderId" placeholder="Contoh: 1780779327361">
        <button onclick="cekStatus()">Cari Orderan</button>

        <div id="boxHasil" class="hasil">
            <p><strong>ID & Zona:</strong> <span id="resPlayerId"></span></p>
            <p><strong>Paket:</strong> <span id="resPaket"></span></p>
            <p><strong>Status:</strong> <span id="resStatus" style="color: #ffcc00; font-weight: bold;"></span></p>
        </div>
    </div>
<script>
    async function cekStatus() {
        const id = document.getElementById('inputOrderId').value;
        const boxHasil = document.getElementById('boxHasil');
        if(!id) return alert('Isi ID orderannya dulu!');
        
        try {
            const response = await fetch(`http://localhost:3000/api/orders/${id}`);
            const hasil = await response.json();
            if(hasil.success) {
                document.getElementById('resPlayerId').innerText = hasil.data.player_id;
                document.getElementById('resPaket').innerText = hasil.data.paket_joki;
                const statusEl = document.getElementById('resStatus');
                const statusText = hasil.data.status || 'Pending';
                statusEl.innerText = statusText;
                
                // Warna Status
                if (statusText === 'Lunas') statusEl.style.color = '#48bb78';
                else if (statusText === 'Diproses') statusEl.style.color = '#ecc94b';
                else if (statusText === 'Selesai') statusEl.style.color = '#3182ce';
                else statusEl.style.color = '#f56565';
                
                boxHasil.style.display = 'block';
            } else {
                alert(hasil.message);
                boxHasil.style.display = 'none';
            }
        } catch (error) {
            alert('Gagal nyambung ke server!');
        }
    }
</script>
</body>
</html>
