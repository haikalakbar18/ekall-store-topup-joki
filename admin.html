<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin - Joki Ekall</title>
    <style>
        body {
            background-color: #121620;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
        }
        h1 {
            color: #ffcc00;
            margin-bottom: 30px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background-color: #1a202c;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid #2d3748;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #2d3748;
        }
        th {
            background-color: #2d3748;
            color: #ffcc00;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
        }
        tr:hover {
            background-color: #242f41;
        }
        .no-data {
            text-align: center;
            color: #a0aec0;
            padding: 20px;
        }
        .btn-logout {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #ff3333;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-logout:hover {
            background-color: #cc0000;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <h1>Dashboard Admin - Pesanan Joki</h1>
    <button onclick="logoutAdmin()" class="btn-logout">Keluar Dashboard 🚪</button>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>ID Order</th>
        <th>Diproses Oleh</th>
        <th>ID Player</th>
        <th>Server</th>
        <th>Paket Joki</th>
        <th>Status Orderan</th>
                </tr>
            </thead>
            <tbody id="tabelOrderan">
                </tbody>
        </table>
    </div>

   <script>
    // ====== KUNCI KEAMANAN DASHBOARD ======
    const token = localStorage.getItem('tokenAdmin');

    if (!token) {
        alert('Akses Ditolak! Kamu harus login dulu, Kall!');
        window.location.href = 'login.html';
    }

    function logoutAdmin() {
        localStorage.removeItem('tokenAdmin');
        alert('Berhasil keluar dari Dashboard!');
        window.location.href = 'login.html';
    }
    // ======================================

    // Fungsi untuk mengambil data dari backend Node.js
    async function ambilDataOrderan() {
        try {
            const response = await fetch('http://localhost:3000/api/orders', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            });
            
            const hasil = await response.json();
            const tabel = document.getElementById('tabelOrderan');
            tabel.innerHTML = ''; 

            if (hasil.success && hasil.data && hasil.data.length > 0) {
                hasil.data.forEach(order => {
                    const statusSekarang = order.status || 'Pending';                    
                    const baris = `
                        <tr>
                            <td style="color: #a0aec0;">${order.id}</td>
                            <td style="color: #48bb78; font-weight: bold;">${order.nama_admin ? order.nama_admin : 'Sistem'}</td>
                            <td style="font-weight: bold;">${order.player_id}</td>
                            <td style="font-weight: bold;">${order.zone_id}</td>
                            <td style="color: #ffcc00;">${order.paket_joki}</td>
                            <td>
                                <select onchange="updateStatus('${order.id}', this.value, '${order.email || 'kosong'}')" style="background:#2d3748; color:white; border:1px solid #4a5568; padding:8px; border-radius:4px; cursor:pointer; margin-right: 10px;">
                                    <option value="Pending" ${statusSekarang === 'Pending' ? 'selected' : ''}>Pending</option>
                                    <option value="Lunas" ${statusSekarang === 'Lunas' ? 'selected' : ''}>Lunas</option>
                                    <option value="Diproses" ${statusSekarang === 'Diproses' ? 'selected' : ''}>Diproses</option>
                                    <option value="Selesai" ${statusSekarang === 'Selesai' ? 'selected' : ''}>Selesai</option>
                                </select>
                                <button onclick="hapusOrderan('${order.id}')" style="background:#e53e3e; color:white; border:none; padding:8px 12px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:12px;">
                                    Hapus
                                </button>
                            </td>
                        </tr>
                    `;
                    tabel.innerHTML += baris;
                });
            } else {
                tabel.innerHTML = `<tr><td colspan="6" class="no-data">Belum ada orderan masuk nih, Kall.</td></tr>`;
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Gagal tersambung ke server backend!');
        }
    }

    // Fungsi update status
    async function updateStatus(id, statusBaru, emailPembeli) {
        try {
            const response = await fetch(`http://localhost:3000/api/orders/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: statusBaru, email: emailPembeli })
            });
            const hasil = await response.json();
            if (hasil.success) {
                alert(hasil.message);
                ambilDataOrderan();
            } else {
                alert('Gagal update: ' + hasil.message);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Gagal update status!');
        }
    } 

    // Fungsi hapus
    async function hapusOrderan(id) {
        if (confirm('Yakin ingin menghapus orderan ini, Kall?')) {
            try {
                const response = await fetch(`http://localhost:3000/api/orders/${id}`, { method: 'DELETE' });
                const hasil = await response.json();
                if (hasil.success) {
                    alert(hasil.message);
                    ambilDataOrderan();
                } else {
                    alert('Gagal menghapus: ' + hasil.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Gagal menghapus data!');
            }
        }
    }

    window.onload = ambilDataOrderan;
</script>
</body>
</html>
